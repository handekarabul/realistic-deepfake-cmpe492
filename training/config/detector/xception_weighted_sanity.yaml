# weighted CE [2,1], FF++ train, FF-DF test, short CPU run

log_dir: ./logs/training/
task_target: wce_sanity

pretrained: ./training/pretrained/xception-b5690688.pth
model_name: xception
backbone_name: xception

backbone_config:
  mode: original
  num_classes: 2
  inc: 3
  dropout: false

all_dataset: [FaceForensics++, FF-F2F, FF-DF, FF-FS, FF-NT, FaceShifter, DeepFakeDetection, Celeb-DF-v1, Celeb-DF-v2, DFDCP, DFDC, DeeperForensics-1.0, UADFV]
train_dataset: [FaceForensics++]
test_dataset: [FF-DF]

compression: c23
train_batchSize: 4
test_batchSize: 4
workers: 0
frame_num: {'train': 4, 'test': 4}
resolution: 224
with_mask: false
with_landmark: false

use_data_augmentation: false
data_aug:
  flip_prob: 0.5
  rotate_prob: 0.0
  rotate_limit: [-10, 10]
  blur_prob: 0.5
  blur_limit: [3, 7]
  brightness_prob: 0.5
  brightness_limit: [-0.1, 0.1]
  contrast_limit: [-0.1, 0.1]
  quality_lower: 40
  quality_upper: 100

mean: [0.5, 0.5, 0.5]
std: [0.5, 0.5, 0.5]

optimizer:
  type: adam
  adam:
    lr: 0.0002
    beta1: 0.9
    beta2: 0.999
    eps: 0.00000001
    weight_decay: 0.0005
    amsgrad: false
  sgd:
    lr: 0.0002
    momentum: 0.9
    weight_decay: 0.0005

lr_scheduler: null
nEpochs: 3
start_epoch: 0
save_epoch: 1
rec_iter: 100
logdir: ./logs
manualSeed: 1024
save_ckpt: true
save_feat: false

loss_func: weighted_cross_entropy
class_weights: [2.0, 1.0]
losstype: null

metric_scoring: auc

# Local machine has no CUDA (verified); trainer falls back to CPU
cuda: false
cudnn: false
